name: Vault Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      RUNE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RUNE_SUPABASE_SERVICE_ROLE_KEY }}
      BASE44_SERVICE_TOKEN: ${{ secrets.BASE44_SERVICE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run vault migration
        run: node scripts/vault-migrate.js
